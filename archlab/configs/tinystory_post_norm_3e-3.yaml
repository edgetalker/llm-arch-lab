model:
  vocab_size: 10000
  context_length: 256
  d_model: 512
  num_layers: 4
  num_heads: 16
  d_ff: 1344
  theta: 10000.0

optim:
  lr: 3.0e-3
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  max_lr: 3.0e-3
  min_lr: 3.0e-4
  warmup_iters: 500
  cosine_cycle_iters: 20000
  grad_clip: 1.0

train:
  batch_size: 64
  total_iters: 20000
  seed: 42
  device: auto
  dtype: float32
  log_interval: 100
  eval_interval: 500
  eval_iters: 100
  ckpt_interval: 1000

io:
  train_data_path: data/tinystories_train.bin
  val_data_path: data/tinystories_val.bin
  ckpt_dir: runs/tinystory_post_norm
  resume_from: null
  keep_last_k: 3
  wandb_project: cs336-layernorm
  wandb_run_name: tinystory_post_norm
  no_wandb: false