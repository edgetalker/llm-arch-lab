model:
  vocab_size: 10000
  context_length: 256
  d_model: 128
  num_layers: 2
  num_heads: 4
  d_ff: 512
  theta: 10000.0

optim:
  lr: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.1
  max_lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_iters: 100
  cosine_cycle_iters: 1000
  grad_clip: 1.0

train:
  batch_size: 8
  total_iters: 200
  seed: 42
  device: auto
  dtype: float32
  log_interval: 10
  eval_interval: 100
  eval_iters: 20
  ckpt_interval: 100

io:
  train_data_path: data/tinystories_val.bin
  val_data_path: data/tinystories_val.bin
  ckpt_dir: runs/smoke
  resume_from: null
